<div class="library-container">

  <header class="library-header">

    <div class="search-box">
      <span class="search-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </span>

      <input type="text" placeholder="Search clips..." class="search-input"
      [(ngModel)]="searchQuery"
        (input)="onSearch()">

    </div>

    <div class="filters">
      <app-custom-dropdown
  [label]="'All Games'"
  [options]="games">
</app-custom-dropdown>

<app-custom-dropdown
  [label]="'All Tags'"
  [options]="tags">
</app-custom-dropdown>

<app-custom-dropdown
  [label]="'Sort by'"
  [options]="sortOptions">
</app-custom-dropdown>
    </div>

    <div class = "profile-nav" >
      <a routerLink="/profile" routerLinkActive="active">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="nav-icon" width="100%" height="100%">
          <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
          <circle cx="12" cy="9.5" r="3.5" fill="none" stroke="currentColor" stroke-width="2"/>
          <polyline points="4.5 18.5 7.5 15.5 12 17 16.5 15.5 19.5 18.5" fill="none" stroke="currentColor" stroke-width="2"/>
        </svg>
      </a>
     </div>
  </header>

  <main class="clips-grid">
    <app-clip-card *ngFor="let clip of clips"
      [clip]="clip"
      (removeClip)="handleDelete($event)">
    </app-clip-card>
  </main>
</div>
