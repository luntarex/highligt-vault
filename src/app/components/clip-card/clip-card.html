<div class="card-container" [routerLink]="['/clip-editor', clip.id]">
  <div class="thumbnail-wrapper">
    <img [src]="clip.thumbnailUrl" class="thumbnail-img" alt="Clip Thumbnail">

    <span class="badge game-badge">{{ clip.game }}</span>

    <span class="badge duration-badge">{{ formatDuration(clip.duration) }}</span>

    <button class="delete-btn" (click)="onDelete($event)" title="Delete Clip">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
      </svg>
    </button>
  </div>

  <div class="clip-info">
    <h3 class="clip-title">{{ clip.title }}</h3>

    <div class="tags-row">
      <span *ngFor="let tag of clip.tags" class="tag" [attr.data-tag]="tag.toLowerCase()">
        {{ tag }}
      </span>
    </div>

    <p class="clip-date">{{ clip.dateCreated | date:'shortDate' }}</p>
  </div>
</div>
