spring.application.name=highligt-vault

# ── MySQL (Aiven Cloud) ──────────────────────────────────────
# Uncomment below if your 'unf_hvault' is hosted on Aiven
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/unf_hvault}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# ── MySQL (Localhost) ────────────────────────────────────────
# Uncomment below if you are running a local MySQL Server (like XAMPP or Workbench)
# spring.datasource.url=jdbc:mysql://localhost:3306/unf_hvault
# spring.datasource.username=root
# spring.datasource.password=
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ── JDBC / Connection Pool ─────────────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── Server ─────────────────────────────────────────────
server.port=${PORT:8080}

# Database Initialization
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}
spring.sql.init.continue-on-error=true
# spring.sql.init.data-locations=classpath:data.sql
# ── CORS (Angular dev server) ──────────────────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,https://vibevault.muratkazancioglu.tech,https://highlight-vault.kazancioglumuratt.workers.dev}

# ── File Upload Limits ─────────────────────────────────
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=500MB

# ── Cloudflare R2 storage (S3-compatible) ──────────────
# When r2.enabled=true and the keys below are set, new video/image uploads go to
# R2 instead of Cloudinary (zero egress fees). Legacy Cloudinary URLs keep working.
# r2.public-base-url is the R2 bucket's public URL: a custom domain (e.g.
# https://media.example.com) or the bucket's r2.dev URL — must be enabled in Cloudflare.
r2.enabled=${R2_ENABLED:false}
r2.account-id=${R2_ACCOUNT_ID:}
r2.access-key=${R2_ACCESS_KEY_ID:}
r2.secret-key=${R2_SECRET_ACCESS_KEY:}
r2.bucket=${R2_BUCKET:}
r2.public-base-url=${R2_PUBLIC_BASE_URL:}

# Cloudinary upload proxy
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dticc1u7k}
cloudinary.upload-preset=${CLOUDINARY_UPLOAD_PRESET:hvault_unsigned}
# Required only for permanent deletion of assets on hard delete (signed API).
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.upload.video.optimization.enabled=${APP_UPLOAD_VIDEO_OPTIMIZATION_ENABLED:true}
app.upload.video.optimization.required=${APP_UPLOAD_VIDEO_OPTIMIZATION_REQUIRED:false}
app.upload.video.optimization.ffmpeg-path=${FFMPEG_PATH:ffmpeg}
app.upload.video.optimization.timeout-seconds=${APP_UPLOAD_VIDEO_OPTIMIZATION_TIMEOUT_SECONDS:120}
app.upload.video.optimization.max-width=${APP_UPLOAD_VIDEO_OPTIMIZATION_MAX_WIDTH:1280}
app.upload.video.optimization.max-height=${APP_UPLOAD_VIDEO_OPTIMIZATION_MAX_HEIGHT:720}
app.upload.video.optimization.crf=${APP_UPLOAD_VIDEO_OPTIMIZATION_CRF:28}
app.upload.video.optimization.preset=${APP_UPLOAD_VIDEO_OPTIMIZATION_PRESET:fast}
# Hard reject only above this raw size (500MB). Within it, the video is optimized
# and, if still over the target below, compressed down to fit instead of erroring.
app.upload.video.max-bytes=${APP_UPLOAD_VIDEO_MAX_BYTES:524288000}
# Target output size (100MB). Oversized clips are re-encoded (2-pass) toward this,
# never below the quality floor (min video bitrate), so long clips may stay larger.
app.upload.video.target-bytes=${APP_UPLOAD_VIDEO_TARGET_BYTES:104857600}
app.upload.video.compression.min-video-bitrate-kbps=${APP_UPLOAD_VIDEO_MIN_BITRATE_KBPS:1500}
app.upload.video.compression.timeout-seconds=${APP_UPLOAD_VIDEO_COMPRESSION_TIMEOUT_SECONDS:300}

# JWT
app.jwt.secret=${APP_JWT_SECRET:change-this-dev-secret-to-a-long-random-value}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:604800}

# Moderation
app.moderation.ai.enabled=${APP_MODERATION_AI_ENABLED:false}
app.moderation.ai.model=${OPENAI_MODERATION_MODEL:gpt-5.4}
app.moderation.ai.transcription-model=${OPENAI_TRANSCRIPTION_MODEL:gpt-4o-transcribe}
app.moderation.ai.audio-provider=${APP_MODERATION_AI_AUDIO_PROVIDER:openai}
app.moderation.ai.frame-scan.enabled=${APP_MODERATION_AI_FRAME_SCAN_ENABLED:true}
app.moderation.ai.audio-scan.enabled=${APP_MODERATION_AI_AUDIO_SCAN_ENABLED:true}
app.moderation.feedback.enabled=${APP_MODERATION_FEEDBACK_ENABLED:true}
app.moderation.feedback.max-examples=${APP_MODERATION_FEEDBACK_MAX_EXAMPLES:6}
app.moderation.gemini.audio-model=${GEMINI_AUDIO_MODEL:gemini-2.5-flash-lite}
app.moderation.ffmpeg.path=${FFMPEG_PATH:ffmpeg}
app.moderation.ffmpeg.frame-count=${FFMPEG_FRAME_COUNT:3}
app.moderation.ffmpeg.audio-segment-count=${FFMPEG_AUDIO_SEGMENT_COUNT:5}
app.moderation.ffmpeg.audio-segment-seconds=${FFMPEG_AUDIO_SEGMENT_SECONDS:4}
app.moderation.ffmpeg.timeout-seconds=${FFMPEG_TIMEOUT_SECONDS:20}
app.moderation.ffmpeg.audio-segment-timeout-seconds=${FFMPEG_AUDIO_SEGMENT_TIMEOUT_SECONDS:10}
openai.api-key=${OPENAI_API_KEY:}
gemini.api-key=${GEMINI_API_KEY:}

# AI metadata import. Primary uses direct OpenAI; fallback can use an OpenAI-compatible provider.
app.metadata.ai.enabled=${APP_METADATA_AI_ENABLED:true}
app.metadata.ai.responses-url=${HVAULT_METADATA_OPENAI_RESPONSES_URL:https://api.openai.com/v1/responses}
app.metadata.ai.api-key=${HVAULT_METADATA_OPENAI_API_KEY:${OPENAI_API_KEY:}}
app.metadata.ai.model=${HVAULT_METADATA_OPENAI_MODEL:${OPENAI_MODERATION_MODEL:gpt-5.4}}
app.metadata.ai.fallback.responses-url=${HVAULT_METADATA_OPENAI_FALLBACK_RESPONSES_URL:https://api.byesu.com/v1/responses}
app.metadata.ai.fallback.api-key=${HVAULT_METADATA_OPENAI_FALLBACK_API_KEY:}
app.metadata.ai.fallback.model=${HVAULT_METADATA_OPENAI_FALLBACK_MODEL:${OPENAI_MODERATION_MODEL:gpt-5.4}}
app.metadata.ai.audio.enabled=${HVAULT_METADATA_AI_AUDIO_ENABLED:true}
app.metadata.ai.audio.max-samples=${HVAULT_METADATA_AI_AUDIO_MAX_SAMPLES:5}
app.metadata.ai.audio.transcription.enabled=${HVAULT_METADATA_AI_AUDIO_TRANSCRIPTION_ENABLED:true}
app.metadata.ai.fragment-count=${HVAULT_METADATA_AI_FRAGMENT_COUNT:5}
app.metadata.ai.fragment-seconds=${HVAULT_METADATA_AI_FRAGMENT_SECONDS:4}
app.metadata.ai.frames-per-fragment=${HVAULT_METADATA_AI_FRAMES_PER_FRAGMENT:3}
app.metadata.ai.frame-scale=${HVAULT_METADATA_AI_FRAME_SCALE:768}
app.metadata.ai.frame-detail=${HVAULT_METADATA_AI_FRAME_DETAIL:high}
