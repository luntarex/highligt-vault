<div class="app-container" [class.is-auth-page]="isAuthPage">
  <app-toast></app-toast>
  <app-message-alert></app-message-alert>
  <app-sidebar *ngIf="!isAuthPage"></app-sidebar>
  
  <div class="main-content" [class.has-mobile-header]="!isAuthPage && !isFeedPage">
    <!-- Global Mobile Top Bar (Hidden on Desktop & Feed) -->
    <div class="mobile-top-bar" *ngIf="!isAuthPage && !isFeedPage">
      <button class="mobile-menu-btn" (click)="toggleLeftDrawer($event)" aria-label="Open navigation menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <a routerLink="/" class="mobile-logo-link">
        <h2 class="mobile-logo-title">Vibe Vault</h2>
      </a>
    </div>

    <!-- Routed Content Wrapper -->
    <div class="route-wrapper">
      <router-outlet></router-outlet>
    </div>
  </div>

  <app-mobile-nav *ngIf="!isAuthPage"></app-mobile-nav>

  <!-- Global Left Drawer (Slide from left on mobile) -->
  <ng-container *ngIf="!isAuthPage">
    <div class="left-drawer-scrim" *ngIf="isLeftDrawerOpen" (click)="isLeftDrawerOpen = false"></div>
    <aside class="left-drawer" [class.open]="isLeftDrawerOpen" *transloco="let t">
      <div class="drawer-header">
        <span class="drawer-avatar">
          <img [src]="profilePhotoUrl || 'assets/icons/default-avatar.png'" alt="">
        </span>
        <span class="drawer-username">{{ profileUsername }}</span>
      </div>
      <div class="drawer-divider"></div>

      <a routerLink="/library" class="drawer-item" (click)="isLeftDrawerOpen = false">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
        {{ t('sidebar.library') }}
      </a>
      <a routerLink="/communities" class="drawer-item" (click)="isLeftDrawerOpen = false">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        {{ t('sidebar.communities') }}
      </a>
      <a routerLink="/favorites" class="drawer-item" (click)="isLeftDrawerOpen = false">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
        {{ t('sidebar.favorites') }}
      </a>
      
      @if (isAdmin) {
        <a routerLink="/admin" class="drawer-item" (click)="isLeftDrawerOpen = false">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
          {{ t('sidebar.adminPanel') }}
        </a>
        <a routerLink="/moderation" class="drawer-item" (click)="isLeftDrawerOpen = false">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
          {{ t('sidebar.moderation') }}
        </a>
      }


    </aside>
  </ng-container>

</div>
