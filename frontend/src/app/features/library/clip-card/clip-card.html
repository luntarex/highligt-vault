<div class="card-container"
     (click)="handleCardClick($event)">
  <div class="thumbnail-wrapper">
    <img [src]="clip.thumbnailUrl" class="thumbnail-img" alt="Clip Thumbnail">

    <span class="badge game-badge">{{ clip.game }}</span>
    <span class="badge duration-badge">{{ formatDuration(clip.duration) }}</span>

    <button *ngIf="mode === 'library'" class="delete-btn action-btn" (click)="onDelete($event)" title="Delete Clip">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
      </svg>
    </button>
  </div>

  <div *ngIf="mode === 'trash'" class="recover-overlay" style="display:flex; justify-content:center; gap: 10px; align-items:center;">
     <button class="recover-btn action-btn" title="Recover Clip" (click)="$event.stopPropagation(); recoverClip.emit(clip.id)">
       <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
         <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
       </svg>
     </button>
     <button class="hard-delete-btn action-btn" title="Delete Permanently" (click)="onHardDelete($event)">
       <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
         <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
       </svg>
     </button>
  </div>

  <div class="clip-info">
    <h3 class="clip-title">{{ clip.title }}</h3>

    <div class="tags-row">
      <span *ngFor="let tag of clip.tags" class="tag" [attr.data-tag]="tag.toLowerCase()">
        {{ tag }}
      </span>
    </div>

    <p class="clip-date">{{ clip.dateCreated | date:'shortDate' }}</p>
  </div>
</div>
