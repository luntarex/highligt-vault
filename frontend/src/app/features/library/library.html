<div class="library-container">

  <header class="library-header">
    <div class="library-tabs">
      <button class="tab-btn" [class.active]="activeTab === 'clips' && !selectedGroup" (click)="setTab('clips')">All Clips</button>
      <button class="tab-btn" [class.active]="activeTab === 'groups' || selectedGroup" (click)="setTab('groups')">Groups</button>
    </div>

    <div class="search-box" *ngIf="activeTab === 'clips'">
      <span class="search-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </span>

      <input type="text" placeholder="Search clips..." class="search-input"
      [(ngModel)]="searchQuery"
        (input)="onSearch()">

    </div>

    <div class="filters" *ngIf="activeTab === 'clips' && !selectedGroup">
      <app-custom-dropdown
        [label]="'All Games'"
        [options]="games"
        (selectedOptionChange)="onGameFilter($event)">
      </app-custom-dropdown>

      <app-custom-dropdown
        [label]="'All Tags'"
        [options]="tags"
        (selectedOptionChange)="onTagFilter($event)">
      </app-custom-dropdown>

      <app-custom-dropdown
        [label]="'Sort by'"
        [options]="sortOptions"
        (selectedOptionChange)="onSortChange($event)">
      </app-custom-dropdown>

      <button class="last-deleted-btn" (click)="toggleTrashView()" [class.active]="isTrashView">
        <svg *ngIf="isTrashView" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <svg *ngIf="!isTrashView" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
        {{ isTrashView ? 'Library' : 'Last Deleted' }}
      </button>
    </div>



    <div class="group-header-actions" *ngIf="selectedGroup">
      <button class="back-btn" (click)="backToGroups()">
        &larr; Back to Groups
      </button>
      <h3 class="group-title">{{ selectedGroup.name }}</h3>
    </div>

    <app-profile-dropdown />
  </header>

  <div *ngIf="activeTab === 'clips' && clips.length === 0 && !isTrashView" class="empty-library-state">
    <p>Upload your first clip</p>
  </div>

  <div *ngIf="activeTab === 'groups' && !selectedGroup && groups.length === 0" class="empty-library-state">
    <p>Create your first group to organize clips</p>
  </div>

  <main class="clips-grid" *ngIf="activeTab === 'clips' && !selectedGroup">
    <!-- Clips -->
    <app-clip-card *ngFor="let clip of clips"
      [clip]="clip"
      [mode]="isTrashView ? 'trash' : 'library'"
      (removeClip)="handleDelete($event)"
      (recoverClip)="handleRecover($event)"
      (hardDeleteClip)="handleHardDelete($event)"
      (appealClip)="handleAppeal($event)"
      (toggleFavorite)="handleToggleFavorite($event)"
      (addToGroup)="handleAddToGroup($event)">
    </app-clip-card>

    <!-- Upload Card -->
    <div *ngIf="!isTrashView" class="upload-card" (click)="fileInput.click()">
      <div class="plus-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </div>
    </div>
  </main>

  <!-- Groups Grid -->
  <main class="groups-grid" *ngIf="activeTab === 'groups' && !selectedGroup">
    <div class="upload-card" (click)="createGroup()">
      <div class="plus-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </div>
    </div>
    
        <div class="group-card" *ngFor="let group of groups" (click)="openGroup(group)">
        <img *ngIf="group.thumbnailUrl" [src]="group.thumbnailUrl" class="group-thumbnail" alt="">
        <div class="group-overlay"></div>
        <div class="group-info">
          <h3>{{ group.name }}</h3>
          <p>{{ group.description || 'Library Clips' }}</p>
        </div>
        <div class="group-actions">
           <button class="group-action-btn" (click)="editGroup(group, $event)" title="Edit">
             <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
           </button>
           <button class="group-action-btn delete" (click)="deleteGroup(group, $event)" title="Delete">
             <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
           </button>
        </div>
      </div>
  </main>

  <!-- Selected Group Clips -->
  <main class="clips-grid" *ngIf="selectedGroup">
    <div *ngIf="selectedGroup.clips?.length === 0" class="empty-library-state">
       <p>No clips in this group yet.</p>
    </div>
    <app-clip-card *ngFor="let clip of selectedGroup.clips"
      [clip]="clip"
      [mode]="'library'">
    </app-clip-card>
  </main>


  <input type="file" #fileInput (change)="onFileSelected($event)" accept="video/*" style="display: none;">

  <app-confirm-dialog
    *ngIf="showDeleteModal"
    [title]="'Delete Permanently'"
    message="Are you sure you want to delete this clip from your library?"
    confirmText="Delete"
    cancelText="Cancel"
    type="danger"
    (confirmed)="onConfirmDelete()"
    (cancelled)="onCancelDelete()">
  </app-confirm-dialog>

  <app-group-dialog
    *ngIf="showGroupDialog"
    [mode]="groupDialogMode"
    [initialName]="editingGroup?.name || ''"
    [initialDescription]="editingGroup?.description || ''"
    (saved)="onGroupSaved($event)"
    (cancelled)="onGroupDialogCancelled()">
  </app-group-dialog>

  <div class="dialog-overlay" *ngIf="showAddToGroupDialog" (click)="cancelAddToGroup()">
    <div class="dialog-content" (click)="$event.stopPropagation()">
      <h3 class="dialog-title">Add to Group</h3>
      <div *ngIf="groups.length > 0; else noGroups">
         <select [(ngModel)]="selectedGroupIdToAdd" class="dialog-input">
            <option *ngFor="let group of groups" [value]="group.id">{{ group.name }}</option>
         </select>
         <div class="dialog-actions">
           <button class="cancel-btn" (click)="cancelAddToGroup()">Cancel</button>
           <button class="save-btn" (click)="confirmAddToGroup()">Add</button>
         </div>
      </div>
      <ng-template #noGroups>
         <p>You have no groups. Create a group first.</p>
         <div class="dialog-actions">
           <button class="cancel-btn" (click)="cancelAddToGroup()">Close</button>
         </div>
      </ng-template>
    </div>
  </div>
</div>
