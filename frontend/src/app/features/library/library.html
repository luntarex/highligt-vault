<div class="library-container">

  <header class="library-header">

    <div class="search-box">
      <span class="search-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </span>

      <input type="text" placeholder="Search clips..." class="search-input"
      [(ngModel)]="searchQuery"
        (input)="onSearch()">

    </div>

    <div class="filters">
      <app-custom-dropdown
  [label]="'All Games'"
  [options]="games">
</app-custom-dropdown>

<app-custom-dropdown
  [label]="'All Tags'"
  [options]="tags">
</app-custom-dropdown>

<app-custom-dropdown
  [label]="'Sort by'"
  [options]="sortOptions">
</app-custom-dropdown>
    </div>

    <div class="profile-dropdown-wrapper" style="position: relative;">
      <ng-container *ngIf="user">
        <div class="profile-nav" (click)="toggleProfileMenu()">
          <img [src]="user.profilePhotoUrl ? user.profilePhotoUrl : 'assets/icons/default-avatar.png'">
        </div>

        <div class="profile-popup" *ngIf="isProfileMenuOpen">
          <div class="popup-header">
            <span class="popup-username">{{ user.username }}</span>
          </div>
          <div class="popup-divider"></div>
          <a routerLink="/profile" class="popup-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="popup-icon"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            Profile
          </a>
          <button class="popup-item signout-btn" (click)="signOut()">
             <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="popup-icon"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Sign Out
          </button>
        </div>
      </ng-container>
    </div>
  </header>

  <main class="clips-grid">
    <app-clip-card *ngFor="let clip of clips"
      [clip]="clip"
      (removeClip)="handleDelete($event)">
    </app-clip-card>
  </main>
</div>
