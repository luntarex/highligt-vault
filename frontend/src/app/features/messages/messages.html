<div class="messages-container">
  <!-- Sidebar: Conversation List -->
  <aside class="conversation-sidebar">
    <div class="sidebar-header">
      <h2>Messages</h2>
    </div>
    <div class="conversation-list">
      <div *ngFor="let conv of conversations" 
           class="conversation-item" 
           [class.active]="conv.other_user_id === selectedUserId"
           (click)="selectUser(conv.other_user_id)">
        <img [src]="conv.profile_photo_url || 'https://i.pravatar.cc/150?img=1'" alt="Avatar" class="avatar">
        <div class="conversation-info">
          <div class="header">
            <span class="username">{{ conv.username }}</span>
            <span class="time">{{ conv.created_at | date:'shortTime' }}</span>
          </div>
          <p class="last-message" [class.unread]="!conv.is_read && conv.sender_id !== currentUserId">
            {{ conv.content }}
          </p>
        </div>
      </div>
      <div *ngIf="conversations.length === 0" class="no-messages">
        No conversations yet.
      </div>
    </div>
  </aside>

  <!-- Main: Chat View -->
  <main class="chat-area">
    <div *ngIf="selectedUserId; else noSelection" class="chat-content">
      <header class="chat-header">
        <h3>Chatting with {{ selectedUserId }}</h3> <!-- Fixed later with username -->
      </header>

      <div class="message-history" #scrollMe [scrollTop]="scrollMe.scrollHeight">
        <div *ngFor="let msg of currentConversation" 
             class="message-wrapper"
             [class.sent]="msg.senderId === currentUserId"
             [class.received]="msg.senderId !== currentUserId">
          <div class="message-bubble">
            <p>{{ msg.content }}</p>
            <span class="msg-time">{{ msg.createdAt | date:'shortTime' }}</span>
          </div>
        </div>
        <div *ngIf="loading" class="loading-spinner">Loading...</div>
      </div>

      <footer class="chat-input">
        <form (ngSubmit)="sendMessage()">
          <input type="text" 
                 name="message" 
                 [(ngModel)]="newMessageContent" 
                 placeholder="Type a message..."
                 autocomplete="off">
          <button type="submit" [disabled]="!newMessageContent.trim()">Send</button>
        </form>
      </footer>
    </div>

    <ng-template #noSelection>
      <div class="no-selection">
        <i class="dm-icon">📩</i>
        <h3>Select a user to start chatting</h3>
        <button routerLink="/users">Find users</button>
      </div>
    </ng-template>
  </main>
</div>
