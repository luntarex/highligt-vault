<div class="comments-container" *transloco="let t">
    <div class="comments-header">
        <h2>{{ t('comments.title') }}</h2>
        <app-back-link></app-back-link>
    </div>
    <div class="comments-list">
        @for(comment of comments; track comment.id){
            <div class="comment-group">
                <app-explore-post-card 
                    [post]="convertToExplorePost(comment)"
                    [playingPostId]="playingPostId"
                    [showActions]="false"
                    [showHeader]="false"
                    [showFullscreen]="false"
                    (togglePlayEvent)="handleTogglePlay($event)"
                    (toggleMuteEvent)="handleToggleMute($event)"
                    (seekToEvent)="onSeekTo($event)"
                    (timeUpdateEvent)="onTimeUpdate($event)"
                    (metadataLoadedEvent)="onMetadataLoaded($event)">
                </app-explore-post-card>

                <div class="comment-bubble" [class.tos-violation]="isTosViolation(comment.content)">
                    <div class="comment-author">
                        <img [src]="user?.profilePhotoUrl" alt="">
                        <div class="comment-author-info">
                            <span class="comment-author-name">{{user?.username}}</span>
                            <span class="comment-author-time">{{comment.timeAgo}}</span>
                        </div>
                        <div class="admin-actions" *ngIf="isAdmin && !user?.isAdmin && !isTosViolation(comment.content)">
                            <button (click)="openModerateModal(comment)" class="moderate-btn">
                                {{ t('comments.moderate') }}
                            </button>
                        </div>
                    </div>
                    <div class="comment-content">
                        <p>{{comment.content}}</p>
                    </div>
                </div>
            </div>
        }
    </div>

    <!-- Moderation Modal -->
    <div class="modal-overlay" *ngIf="showModerateModal" (click)="closeModerateModal()">
      <div class="confirm-modal" (click)="$event.stopPropagation()">
        <h2>{{ t('comments.moderateComment') }}</h2>
        <p>{{ t('comments.moderatePrompt') }} <strong>{{user?.username}}</strong>.</p>

        <div class="modal-actions">
          <button class="modal-tos-btn" (click)="moderateTosViolation()">{{ t('comments.markTos') }}</button>
          <button class="modal-delete-btn" (click)="moderateDelete()">{{ t('comments.deleteCompletely') }}</button>
          <button class="modal-cancel-btn" (click)="closeModerateModal()">{{ t('common.cancel') }}</button>
        </div>
      </div>
    </div>
</div>
