<div class="comments-container">
    <div class="comments-header">
        <h2>Comments</h2>
        <app-back-link></app-back-link>
    </div>
    <div class="comments-list">
        @for(comment of comments; track comment.id){
            <div class="comment" [class.tos-violation]="isTosViolation(comment.content)" style="position: relative;">
                <div class="admin-actions" *ngIf="isAdmin && !user?.isAdmin && !isTosViolation(comment.content)" style="position: absolute; top: 16px; right: 16px; z-index: 5;">
                  <button (click)="openModerateModal(comment)" class="moderate-btn">
                    Moderate
                  </button>
                </div>
                <div class="comment-author">
                    <img [src]="user?.profilePhotoUrl" alt="">
                    <div class="comment-author-info">
                        <span class="comment-author-name">{{user?.username}}</span>
                        <span class="comment-author-time">{{comment.timeAgo}}</span>
                    </div>
                </div>
                <div class="comment-content">
                    <p>{{comment.content}}</p>
                </div>
            </div>
        }
    </div>

    <!-- Moderation Modal -->
    <div class="modal-overlay" *ngIf="showModerateModal" (click)="closeModerateModal()">
      <div class="confirm-modal" (click)="$event.stopPropagation()">
        <h2>Moderate Comment</h2>
        <p>Choose an action for this comment by <strong>{{user?.username}}</strong>.</p>
        
        <div class="modal-actions">
          <button class="modal-tos-btn" (click)="moderateTosViolation()">Mark as TOS Violation</button>
          <button class="modal-delete-btn" (click)="moderateDelete()">Delete Completely</button>
          <button class="modal-cancel-btn" (click)="closeModerateModal()">Cancel</button>
        </div>
      </div>
    </div>
</div>
