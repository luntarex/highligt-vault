<div class="favorites-container">
  <header class="favorites-header">
     <div class="header-content">
       <h1 class="favorites-title">Favorites</h1>
       <p class="favorites-subtitle">Your saved highlights, all in one place.</p>
     </div>
     <app-back-link></app-back-link>
  </header>

  <main class="favorites-content">
    <div *ngIf="isLoading" class="loading-state">
      <div class="spinner"></div>
      <p>Loading favorites...</p>
    </div>

    <div *ngIf="!isLoading && favoriteClips.length === 0" class="empty-state">
      <div class="empty-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
        </svg>
      </div>
      <h2>No favorites yet</h2>
      <p>Clips you mark as favorite will show up here.</p>
      <a routerLink="/explore" class="btn-primary">Explore Clips</a>
    </div>

    <div *ngIf="!isLoading && favoriteClips.length > 0" class="clips-grid">
      <app-clip-card
        *ngFor="let clip of favoriteClips"
        [clip]="clip"
        mode="favorites"
        (removeClip)="handleRemoveFavorite($event)"
        (playClip)="openClip($event)">
      </app-clip-card>
    </div>
  </main>

  <app-confirm-dialog
    *ngIf="showRemoveModal"
    title="Remove from Favorites"
    message="Are you sure you want to remove this clip from your favorites?"
    confirmText="Remove"
    cancelText="Cancel"
    type="danger"
    (confirmed)="onConfirmRemove()"
    (cancelled)="onCancelRemove()">
  </app-confirm-dialog>

  <!-- Fullscreen Overlay -->
  @if (playingClip) {
    <div class="fullscreen-overlay" (click)="closeClip()">
      <div class="fullscreen-backdrop"></div>

      <div class="fullscreen-content" (click)="$event.stopPropagation()">
        <div class="fullscreen-video-wrapper">
          <video #fullscreenVideo
                 [src]="playingClip.url"
                 class="fullscreen-video"
                 disablePictureInPicture
                 controlsList="nodownload nofullscreen noremoteplayback noplaybackrate"
                 (timeupdate)="onTimeUpdate(fullscreenVideo)"
                 (click)="onTogglePlay(fullscreenVideo)">
          </video>

          <!-- Fullscreen HUD -->
          <div class="fullscreen-hud">
            <div class="hud-top">
              <div class="post-info">
                <span class="fs-title">{{playingClip.title}}</span>
              </div>
              <button class="close-fullscreen" (click)="closeClip()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="18" y1="6" x2="6" y2="18"></line>
                  <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
              </button>
            </div>

            <div class="hud-bottom">
              <div class="hud-progress-container" (click)="onSeekTo($event, fullscreenVideo)">
                <div class="hud-progress-bar" [style.width.%]="(($any(playingClip).currentTime || 0) / (playingClip.duration || 1)) * 100"></div>
              </div>

              <div class="hud-controls">
                <button class="hud-play-btn" (click)="onTogglePlay(fullscreenVideo)">
                  @if(fullscreenVideo.paused){
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                  } @else {
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                  }
                </button>

                <div class="hud-time">
                  {{ formatTime($any(playingClip).currentTime || 0) }} / {{ formatTime(playingClip.duration || 0) }}
                </div>

                <div class="hud-volume-control">
                  <button class="hud-mute-btn" (click)="onToggleMute($event, fullscreenVideo)">
                    @if(fullscreenVideo.muted || fullscreenVideo.volume === 0){
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
                    } @else {
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                    }
                  </button>
                  <input type="range" class="hud-volume-slider" min="0" max="1" step="0.01"
                         [value]="fullscreenVideo.volume"
                         (input)="onVolumeChange($event, fullscreenVideo)">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  }
</div>
