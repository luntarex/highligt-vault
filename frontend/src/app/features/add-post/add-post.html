<ng-container *transloco="let t">
<div class="page-container" *ngIf="clip">
  <header class="header">
    <app-back-link></app-back-link>
    <div class="header-title">{{ t('addPost.title') }}</div>
  </header>

  <div class="content">
    <div class="preview-section">
      <div class="video-container" (click)="togglePlay(videoPlayer)">
         <video #videoPlayer
                [src]="clip.url"
                class="video-preview"
                muted
                playsinline
                (timeupdate)="onTimeUpdate(videoPlayer)"
                (loadedmetadata)="onMetadataLoaded(videoPlayer)">
         </video>

         <div class="play-button" [class.hidden]="isPlaying">▶</div>

         <div class="controls-bar" (click)="$event.stopPropagation()">
           <div class="progress-container" (click)="onSeekTo($event, videoPlayer)">
             <div class="progress-bar" [style.width]="((currentTime || 0) / (duration || 1) * 100) + '%'"></div>
           </div>
           <div class="time-display">
             {{ formatTime(currentTime || 0) }} / {{ formatTime(duration || 0) }}
           </div>
           <button class="mute-button" (click)="onToggleMute($event, videoPlayer)">
             @if(videoPlayer.muted){
               <svg viewBox="0 0 24 24" class="icon" fill="none" stroke="currentColor" stroke-miterlimit="10">
                 <path d="M12,5V19L7,16H2V8H7Z"></path>
                 <line x1="16" y1="15" x2="22" y2="9"></line>
                 <line x1="16" y1="9" x2="22" y2="15"></line>
               </svg>
             } @else {
               <svg viewBox="0 0 24 24" class="icon" fill="none" stroke="currentColor" stroke-miterlimit="10">
                 <path d="M12,5V19L7,16H2V8H7Z"></path>
                 <path d="M19.3,19.3a11.2,11.2,0,0,0,0-14.6"></path>
                 <path d="M16.4,16.4a6.8,6.8,0,0,0,0-8.8"></path>
               </svg>
             }
           </button>
         </div>
      </div>
      <div class="clip-details">
         <h2 class="clip-title">{{ clip.title }}</h2>
         <span class="game-badge">{{ clip.game || t('addPost.unknownGame') }}</span>
      </div>
    </div>

    <div class="form-section">
      <div class="form-group">
        <label>{{ t('addPost.caption') }}</label>
        <textarea
          class="custom-input"
          [(ngModel)]="caption"
          rows="4"
          [placeholder]="t('addPost.captionPlaceholder')"></textarea>
      </div>

      <div class="form-group">
        <label>{{ t('addPost.tags') }}</label>
        <div class="tag-input-wrapper">
          <input
            type="text"
            class="custom-input"
            [(ngModel)]="newTag"
            (keyup.enter)="addTag()"
            [placeholder]="t('addPost.tagPlaceholder')">
        </div>
        <div class="tags-display">
          <span *ngFor="let tag of clip.tags; let i = index" class="post-tag">
            {{ tag }} <button (click)="removeTag(i)" class="remove-tag-btn">&times;</button>
          </span>
        </div>
      </div>

      <div class="actions">
        <button 
          class="submit-btn" 
          [disabled]="isSubmitting || !caption.trim()" 
          (click)="submitPost()">
          <span *ngIf="!isSubmitting">{{ t('addPost.postToFeed') }}</span>
          <span *ngIf="isSubmitting" class="spinner-container">
            <svg class="spinner" viewBox="0 0 50 50">
              <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
            </svg>
            {{ t('addPost.posting') }}
          </span>
        </button>
      </div>
    </div>
  </div>
</div>
</ng-container>
