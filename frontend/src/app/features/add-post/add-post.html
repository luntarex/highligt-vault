<ng-container *transloco="let t">
<div class="modal-overlay" *ngIf="clip">
  <div class="modal-content">
    <header class="modal-header">
      <div class="header-left">
        <h2 class="header-title">{{ t('addPost.title') }}</h2>
      </div>
      <button class="close-icon" (click)="close.emit()">&times;</button>
    </header>

    <div class="content">
      <div class="preview-section">
        <div class="video-container" style="position: relative;">
          <app-video-player
            [src]="clip.url"
            [showFullscreenBtn]="false"
            [muted]="false"
            [startTime]="clip.startTime || 0"
            [endTime]="clip.endTime || 0"
            [postTitle]="clip.title">
          </app-video-player>
        </div>
        <div class="clip-details">
           <h2 class="clip-title">{{ clip.title }}</h2>
           <span class="game-badge">{{ clip.game || t('addPost.unknownGame') }}</span>
        </div>
      </div>

      <div class="form-section">
        <div class="form-scroll-area">
          <div class="form-group">
            <label>{{ t('addPost.caption') }}</label>
            <textarea
              class="custom-input"
              [(ngModel)]="caption"
              rows="4"
              [placeholder]="t('addPost.captionPlaceholder')"></textarea>
          </div>

          <div class="form-group">
            <label>{{ t('addPost.tags') }}</label>
            <div class="tag-input-wrapper">
              <input
                type="text"
                class="custom-input"
                [(ngModel)]="newTag"
                (keyup.enter)="addTag()"
                [placeholder]="t('addPost.tagPlaceholder')">
            </div>
            <div class="tags-display">
              <span *ngFor="let tag of clip.tags; let i = index" class="post-tag">
                {{ tag }} <button (click)="removeTag(i)" class="remove-tag-btn">&times;</button>
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="close.emit()">{{ t('common.cancel') }}</button>
      <button class="btn-confirm" 
        [disabled]="isSubmitting || !caption.trim()" 
        (click)="submitPost()">
        <span *ngIf="!isSubmitting">{{ t('addPost.postToFeed') }}</span>
        <span *ngIf="isSubmitting" class="spinner-container">
          <svg class="spinner" viewBox="0 0 50 50">
            <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
          </svg>
          {{ t('addPost.posting') }}
        </span>
      </button>
    </div>
  </div>
</div>
</ng-container>
