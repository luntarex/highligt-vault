<div class="edit-profile-container">
  <div class="profile-edit-inner">
    <header class="edit-header">
      <app-back-link></app-back-link>
      <h1>Edit Profile</h1>
    </header>

    <div class="edit-content" *ngIf="user">
      <section class="avatar-section">
        <label class="section-label">Profile Photo</label>
        <div class="current-avatar-preview clickable" (click)="fileInput.click()">
          <img [src]="selectedPhotoUrl" alt="Current Avatar">
          <div class="upload-overlay">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          </div>
        </div>
        <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none;">
        <p class="section-label" style="text-align: center; text-transform: none; font-size: 0.8rem; margin-top: -15px;">Click to upload new photo</p>
    </section>

    <section class="info-section">
      <div class="form-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="username" placeholder="Choose a unique username">
        <span class="input-hint">Your unique handle in the Vault.</span>
      </div>

      <div class="form-group">
        <label>Bio / Description</label>
        <textarea
          [(ngModel)]="description"
          placeholder="Tell the vault about yourself..."
          rows="5"
          maxlength="200"
        ></textarea>
        <div class="char-count">{{ description.length }}/200</div>
      </div>
    </section>

    <footer class="edit-actions">
      <button class="delete-btn" (click)="onDeleteAccount()">Delete Account</button>
      <div class="spacer" style="flex: 1;"></div>
      <button class="cancel-btn" routerLink="/profile">Cancel</button>
      <button class="save-btn" [disabled]="saving" (click)="onSave()">
        {{ saving ? 'Saving...' : 'Save Changes' }}
      </button>
    </footer>
  </div>

  <div class="modal-overlay" *ngIf="showDeleteModal" (click)="closeDeleteModal()">
    <div class="confirm-modal" (click)="$event.stopPropagation()">
      <div class="modal-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
      </div>
      <h2>Delete Account?</h2>
      <p>This action is permanent and your profile will be deactivated. Are you absolutely sure?</p>

      <div class="modal-actions">
        <button class="modal-cancel-btn" (click)="closeDeleteModal()">No, Keep it</button>
        <button class="modal-delete-btn" (click)="confirmDelete()">Yes, Delete account</button>
      </div>
    </div>
  </div>
 </div>
</div>
