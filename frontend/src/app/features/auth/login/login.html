<div class = "auth-container">
<div class="auth-header">
  <h2>Vibe Vault</h2>
  <p>Sign in to your account</p>
</div>
<div class = "auth-card">
  <form #loginForm="ngForm" (ngSubmit)="onLogin()">
    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="loginRequest.username" name="username" required placeholder="player_one">
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-with-icon">
        <input [type]="showPassword ? 'text' : 'password'" name="password" [(ngModel)]="loginRequest.password" placeholder="••••••••" required>

        <button type="button" class="icon-btn" (click)="togglePasswordVisibility()">
          @if (!showPassword) {
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
          }
        </button>
      </div>
    </div>
    <button type="submit" class="submit-btn" [disabled]="loginForm.invalid">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
      Sign In
    </button>

  </form>
 </div>
</div>
