<div class="auth-container" *transloco="let t">
  <div class="auth-header">
    <h2>Vibe Vault</h2>
    <p>{{ t('completeProfile.heading', { username: username }) }}</p>
  </div>

  <div class="auth-card">
    <!-- Avatar Picker -->
    <div class="avatar-section">
      <div class="current-avatar clickable" (click)="fileInput.click()">
        <img [src]="getSelectedAvatarUrl()" alt="Selected avatar">
        <div class="upload-overlay">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        </div>
      </div>
      <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none;">
      <p class="section-label">{{ t('completeProfile.clickPhoto') }}</p>
    </div>

    <!-- Description -->
    <div class="form-group">
      <label>{{ t('completeProfile.aboutYou') }}</label>
      <textarea
        [(ngModel)]="description"
        name="description"
        [placeholder]="t('completeProfile.bioPlaceholder')"
        rows="4"
        maxlength="300">
      </textarea>
      <small class="char-count">{{ description.length }} / 300</small>
    </div>

    <div class="form-group">
      <label>{{ t('completeProfile.importFolders') }}</label>
      <button class="folder-settings-btn" type="button" (click)="openImportFolders()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        </svg>
        {{ t('completeProfile.manageImportFolders') }}
      </button>
    </div>

    <!-- Save Button -->
    <button
      class="submit-btn"
      (click)="onSave()"
      [disabled]="saving">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      {{ saving ? t('completeProfile.saving') : t('completeProfile.saveProfile') }}
    </button>
  </div>

  <app-import-folders-dialog
    *ngIf="showImportFoldersDialog"
    (closed)="closeImportFolders()">
  </app-import-folders-dialog>

  <app-avatar-cropper
    *ngIf="cropFile"
    [file]="cropFile"
    (cropped)="onAvatarCropped($event)"
    (cancelled)="onCropCancelled()">
  </app-avatar-cropper>
</div>
