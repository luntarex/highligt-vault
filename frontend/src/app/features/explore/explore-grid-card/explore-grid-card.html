<a
  class="grid-card"
  [routerLink]="['/post', post.id]"
  (mouseenter)="onEnter()"
  (mouseleave)="onLeave()"
  *transloco="let t">

  <div class="thumb">
    @if (isImage()) {
      <img [src]="post.videoUrl" [alt]="post.title" class="media" loading="lazy">
    } @else {
      <video #video [src]="post.videoUrl" class="media" muted loop playsinline preload="metadata"></video>
    }

    @if (post.game) {
      <span class="game-chip">{{ post.game }}</span>
    }

    <span class="view-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
      {{ post.views || 0 }}
    </span>

    <div class="hover-overlay">
      <div class="stats">
        <span class="stat">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 1 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          {{ post.likes }}
        </span>
        <span class="stat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z"/></svg>
          {{ post.comments }}
        </span>
      </div>
    </div>
  </div>

  <div class="meta">
    <div class="avatar">
      @if (post.author.profilePhotoUrl) {
        <img [src]="post.author.profilePhotoUrl" alt="" class="avatar-img">
      } @else {
        <div class="avatar-placeholder">{{ post.author.username.charAt(0).toUpperCase() }}</div>
      }
    </div>
    <div class="info">
      <span class="title">{{ post.title }}</span>
      <span class="author">{{ post.author.username }}</span>
    </div>
  </div>
</a>
