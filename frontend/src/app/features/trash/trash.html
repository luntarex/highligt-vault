<div class="trash-container">
  <header class="trash-header">
     <div class="header-content">
       <h1 class="trash-title">Trash</h1>
       <p class="trash-subtitle">Deleted highlights can be recovered here.</p>
     </div>
     <app-back-link></app-back-link>
  </header>

  <main class="trash-content">
    <div *ngIf="isLoading" class="loading-state">
      <div class="spinner"></div>
      <p>Loading deleted clips...</p>
    </div>

    <div *ngIf="!isLoading && deletedClips.length === 0" class="empty-state">
      <div class="empty-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
      </div>
      <h2>Trash is empty</h2>
      <p>Items you delete will appear here for recovery.</p>
      <a routerLink="/" class="btn-primary">Explore Library</a>
    </div>

    <div *ngIf="!isLoading && deletedClips.length > 0" class="clips-grid">
      <app-clip-card 
        *ngFor="let clip of deletedClips" 
        [clip]="clip" 
        mode="trash"
        (recoverClip)="handleRecover($event)"
        (hardDeleteClip)="handleHardDelete($event)">
      </app-clip-card>
    </div>
  </main>

  <app-confirm-dialog
    *ngIf="showRecoverModal"
    title="Recover Highlight"
    message="Are you sure you want to bring this highlight back to your library?"
    confirmText="Recover"
    cancelText="Maybe later"
    (confirmed)="onConfirmRecovery()"
    (cancelled)="onCancelRecovery()">
  </app-confirm-dialog>

  <app-confirm-dialog
    *ngIf="showDeleteModal"
    title="Delete Permanently"
    message="Are you sure you want to permanently delete this highlight? This cannot be undone."
    confirmText="Delete"
    cancelText="Cancel"
    type="danger"
    (confirmed)="onConfirmDelete()"
    (cancelled)="onCancelDelete()">
  </app-confirm-dialog>
</div>
