  <div class="profile-dropdown-wrapper">
    <ng-container *ngIf="user">
      <div class="profile-nav" (click)="toggleProfileMenu($event)">
        <img [src]="user.profilePhotoUrl ? user.profilePhotoUrl : 'assets/icons/default-avatar.png'" alt="User Profile">
      </div>

      <div class="profile-popup" *ngIf="isProfileMenuOpen">
        <div class="popup-header">
          <span class="popup-username">{{ user.username }}</span>
        </div>
        <div class="popup-divider"></div>
        <a routerLink="/profile" class="popup-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="popup-icon"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          Profile
        </a>
        <a routerLink="/profile/edit" class="popup-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="popup-icon">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
          Edit Profile
        </a>
        <button class="popup-item signout-btn" (click)="signOut()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="popup-icon"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Sign Out
        </button>
      </div>
    </ng-container>
  </div>
