<div class="profile-dropdown-wrapper" *transloco="let t">
  <ng-container *ngIf="user">
    <div class="profile-nav" (click)="toggleProfileMenu($event)">
      <img [src]="user.profilePhotoUrl ? user.profilePhotoUrl : 'assets/icons/default-avatar.png'">
    </div>

    <!-- Mobile drawer scrim (hidden on desktop, where the menu is a dropdown). -->
    <div class="profile-scrim" *ngIf="isProfileMenuOpen" (click)="isProfileMenuOpen = false"></div>

    <div class="profile-popup" *ngIf="isProfileMenuOpen">
      <div class="popup-header">
        <span class="popup-username">{{ user.username }}</span>
      </div>
      <div class="popup-divider"></div>
      <a routerLink="/profile" class="popup-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="popup-icon"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        {{ t('profileMenu.profile') }}
      </a>
      <a routerLink="/profile/edit" class="popup-item">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="popup-icon">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        {{ t('profileMenu.editProfile') }}
      </a>
      <a routerLink="/communities" class="popup-item popup-item-mobile-only" (click)="isProfileMenuOpen = false">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="popup-icon"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        {{ t('sidebar.communities') }}
      </a>
      <a routerLink="/favorites" class="popup-item popup-item-mobile-only" (click)="isProfileMenuOpen = false">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="popup-icon"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
        {{ t('sidebar.favorites') }}
      </a>
      @if (isAdmin()) {
        <a routerLink="/admin" class="popup-item popup-item-mobile-only" (click)="isProfileMenuOpen = false">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="popup-icon"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
          {{ t('sidebar.adminPanel') }}
        </a>
        <a routerLink="/moderation" class="popup-item popup-item-mobile-only" (click)="isProfileMenuOpen = false">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="popup-icon"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
          {{ t('sidebar.moderation') }}
        </a>
      }
      <button class="popup-item" (click)="openSettings($event)">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="popup-icon">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.51a2 2 0 0 1 1-1.72l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        {{ t('profileMenu.importFolders') }}
      </button>
      <button class="popup-item signout-btn" (click)="signOut()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="popup-icon"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        {{ t('profileMenu.signOut') }}
      </button>
      <div class="popup-mobile-preferences">
        <div class="popup-preference-actions">
          <button
            *ngFor="let lang of languageService.available"
            type="button"
            class="popup-choice-btn"
            [class.active]="languageService.uiLanguage() === lang.code"
            (click)="setLanguage(lang.code)"
            [title]="lang.label">
            {{ lang.code | uppercase }}
          </button>

          <button
            type="button"
            class="popup-theme-btn"
            (click)="toggleTheme()"
            [title]="t('sidebar.toggleTheme')"
            [attr.aria-label]="t('sidebar.toggleTheme')">
            @if (themeService.theme() === 'dark') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
              </svg>
            } @else {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
              </svg>
            }
          </button>
        </div>
      </div>
    </div>
  </ng-container>

  <app-import-folders-dialog
    *ngIf="showSettingsDialog"
    (closed)="closeSettings()">
  </app-import-folders-dialog>
</div>
