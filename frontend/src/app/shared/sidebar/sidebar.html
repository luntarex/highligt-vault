<nav class="sidebar-container" [class.collapsed]="isCollapsed">

  <div class="sidebar-header">
    <a routerLink="/explore" class="sidebar-logo-link" *ngIf="!isCollapsed">
      <h2 class="sidebar-title">Vibe Vault</h2>
    </a>

    <button class="toggle-btn" (click)="toggleSidebar()">
      <img src="assets/icons/chevron-left.svg" alt="Toggle Sidebar" class="toggle-icon">
    </button>
  </div>

  <ul class="nav-links">
    <li>
      <a routerLink="/explore" routerLinkActive="active">
        <img src="assets/icons/compass.svg" alt="Explore" class="nav-icon">
        <span class="link-text">Explore</span>
      </a>
    </li>
    <li>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <img src="assets/icons/notebook.svg" alt="Library" class="nav-icon">
        <span class="link-text">Library</span>
      </a>
    </li>

    <li>
      <a routerLink="/favorites" routerLinkActive="active">
        <img src="assets/icons/bookmark.svg" alt="Favorites" class="nav-icon">
        <span class="link-text">Favorites</span>
      </a>
    </li>

    <li>
      <a routerLink="/messages" routerLinkActive="active">
        <img src="assets/icons/message-square.svg" alt="Messages" class="nav-icon">
        <span class="link-text">Messages</span>
      </a>
    </li>


    @if(authService.isAdmin()){
    <li>
      <a routerLink="/users" routerLinkActive="active">
        <img src="assets/icons/compass.svg" alt="Community" class="nav-icon">
        <span class="link-text">Users</span>
      </a>
    </li>
  }
  </ul>

  <div class="separator"></div>

  <div class="playlists-area">

    <div class="playlist-header" *ngIf="!isCollapsed">
      <span class="playlist-title">PLAYLISTS</span>
      <button class="add-btn" title="Create Playlist" (click)="createPlaylist()">
        <img src="assets/icons/plus-square.svg" alt="Add Playlist" class="add-icon">
      </button>
    </div>

    <ul class="nav-links playlist-list">
      <li *ngFor="let playlist of playlists" class="playlist-item-wrapper">
        <a class="playlist-item" [routerLink]="['/playlist', playlist.id]" routerLinkActive="active">
          <img src="assets/icons/movieclip.svg" class="nav-icon">
          <span class="link-text">{{ playlist.name }}</span>
        </a>
        <button class="more-btn" *ngIf="!isCollapsed" (click)="toggleMenu(playlist.id, $event)" title="More options">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="5" r="2"></circle>
            <circle cx="12" cy="12" r="2"></circle>
            <circle cx="12" cy="19" r="2"></circle>
          </svg>
        </button>

        <!-- Context Menu -->
        <div class="playlist-context-menu" *ngIf="activeMenuId === playlist.id">
          <button class="context-item" (click)="editPlaylist(playlist, $event)">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
            Edit
          </button>
          <button class="context-item context-danger" (click)="confirmDeletePlaylist(playlist, $event)">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
            Delete
          </button>
        </div>
      </li>
    </ul>
  </div>

  <div class="separator"></div>

  <div class="upload-btn">
    <input type="file" #fileInput (change)="onFileSelected($event)" accept="video/*" style="display: none;">
    <button (click)="fileInput.click()">
      <img src="assets/icons/upload.svg" alt="Upload" class="upload-icon">
      <span class="upload-text">Upload Clip</span>
    </button>
  </div>

  <div class="sidebar-footer">
    <a routerLink="/about-us" routerLinkActive="active" class="about-link">
      <img src="assets/icons/search.svg" alt="About Us" class="nav-icon">
      <span class="link-text">About Us</span>
    </a>
  </div>

</nav>

<app-playlist-dialog
  *ngIf="showPlaylistDialog"
  [mode]="playlistDialogMode"
  [initialName]="editingPlaylist?.name || ''"
  [initialDescription]="editingPlaylist?.description || ''"
  (created)="onPlaylistCreated($event)"
  (cancelled)="onPlaylistDialogCancelled()">
</app-playlist-dialog>

<app-confirm-dialog
  *ngIf="showDeleteConfirm"
  title="Delete Playlist"
  [message]="'Are you sure you want to delete \'' + (playlistToDelete?.name || '') + '\'? This action cannot be undone.'"
  confirmText="Delete"
  cancelText="Cancel"
  type="danger"
  (confirmed)="onConfirmDelete()"
  (cancelled)="onCancelDelete()">
</app-confirm-dialog>
