<nav class="sidebar-container" [class.collapsed]="isCollapsed">

  <div class="sidebar-header">
    <a routerLink="/" class="sidebar-logo-link" *ngIf="!isCollapsed">
      <h2 class="sidebar-title">Vibe Vault</h2>
    </a>

    <button class="toggle-btn" (click)="toggleSidebar()">
      <img src="assets/icons/chevron-left.svg" alt="Toggle Sidebar" class="toggle-icon">
    </button>
  </div>

  <ul class="nav-links">
    <li>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <img src="assets/icons/home.svg" alt="Feed" class="nav-icon">
        <span class="link-text">Feed</span>
      </a>
    </li>
    <li>
      <a routerLink="/explore" routerLinkActive="active">
        <img src="assets/icons/compass.svg" alt="Explore" class="nav-icon">
        <span class="link-text">Explore</span>
      </a>
    </li>
    <li>
      <a routerLink="/communities" routerLinkActive="active">
        <img src="assets/icons/community-4squares.svg" alt="Communities" class="nav-icon">
        <span class="link-text">Communities</span>
      </a>
    </li>
    <li>
      <a routerLink="/library" routerLinkActive="active">
        <img src="assets/icons/notebook.svg" alt="Library" class="nav-icon">
        <span class="link-text">Library</span>
      </a>
    </li>

    <li>
      <a routerLink="/favorites" routerLinkActive="active">
        <img src="assets/icons/bookmark.svg" alt="Favorites" class="nav-icon">
        <span class="link-text">Favorites</span>
      </a>
    </li>

    <li>
      <a routerLink="/messages" routerLinkActive="active">
        <img src="assets/icons/message-square.svg" alt="Messages" class="nav-icon">
        <span class="link-text">Messages</span>
      </a>
    </li>

    @if(authService.isAdmin()){
    <li>
      <a routerLink="/admin" routerLinkActive="active">
        <img src="assets/icons/compass.svg" alt="Community" class="nav-icon">
        <span class="link-text">Admin Panel</span>
      </a>
    </li>
    <li>
      <a routerLink="/moderation" routerLinkActive="active">
        <img src="assets/icons/notebook.svg" alt="Moderation" class="nav-icon">
        <span class="link-text">Moderation</span>
      </a>
    </li>
  }
  </ul>

  <div class="separator"></div>

  <div class="sidebar-footer">
    <a routerLink="/about-us" routerLinkActive="active" class="about-link">
      <img src="assets/icons/search.svg" alt="About Us" class="nav-icon">
      <span class="link-text">About Us</span>
    </a>
  </div>

</nav>
