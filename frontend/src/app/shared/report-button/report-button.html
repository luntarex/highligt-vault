<button
  type="button"
  class="report-trigger"
  [class.compact]="compact"
  [attr.aria-label]="label + ' ' + targetLabel"
  [attr.title]="label + ' ' + targetLabel"
  (click)="open($event)">
  <svg viewBox="0 0 24 24" aria-hidden="true">
    <path d="M4 21V5.5c0-.83.67-1.5 1.5-1.5h6.14c.38 0 .74.14 1.02.4l.76.7c.28.26.64.4 1.02.4H20v10h-5.56c-.38 0-.74-.14-1.02-.4l-.76-.7c-.28-.26-.64-.4-1.02-.4H6v7H4Z"></path>
  </svg>
  <span class="sr-only">{{ label }}</span>
</button>

<div class="report-overlay" *ngIf="isOpen" (click)="close($event)">
  <div class="report-modal" (click)="$event.stopPropagation()">
    <div class="report-header">
      <div>
        <span>Report {{ targetLabel }}</span>
        <h3>What is wrong here?</h3>
      </div>
      <button type="button" class="report-close" (click)="close($event)">x</button>
    </div>

    <div class="report-field">
      <span>Reason</span>
      <app-custom-dropdown
        [label]="'Select a reason'"
        [options]="reasonOptions"
        [selectedOption]="selectedReasonLabel()"
        (selectedOptionChange)="onReasonLabelChange($event)">
      </app-custom-dropdown>
    </div>

    <label class="report-field">
      <span>Details optional</span>
      <textarea
        [(ngModel)]="details"
        maxlength="1000"
        rows="4"
        placeholder="Add context for moderators..."></textarea>
    </label>

    <div class="report-footer">
      <button type="button" class="cancel-report" (click)="close($event)">Cancel</button>
      <button type="button" class="submit-report" [disabled]="isSubmitting" (click)="submit($event)">
        {{ isSubmitting ? 'Sending...' : 'Submit report' }}
      </button>
    </div>
  </div>
</div>
