<nav class="mobile-nav" *transloco="let t">
  <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    <span class="nav-label">{{ t('sidebar.feed') }}</span>
  </a>

  <a routerLink="/explore" routerLinkActive="active" class="nav-item">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <span class="nav-label">{{ t('sidebar.explore') }}</span>
  </a>

  <a href="#" (click)="openClipPicker($event)" class="nav-item create-btn">
    <div class="create-icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </div>
    <span class="nav-label">{{ t('sidebar.create') }}</span>
  </a>



  <a routerLink="/messages" routerLinkActive="active" class="nav-item">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    <span class="nav-label">{{ t('sidebar.messages') }}</span>
  </a>

  <!-- Profile Bottom Sheet Trigger -->
  <a href="#" (click)="toggleProfileSheet($event)" class="nav-item profile-tab" [class.active]="isProfileSheetOpen">
    <div class="nav-avatar">
      <img [src]="profilePhotoUrl || 'assets/icons/default-avatar.png'" alt="Profile">
    </div>
    <span class="nav-label">{{ t('sidebar.profile') }}</span>
  </a>
</nav>

<!-- Profile Bottom Sheet -->
<div class="sheet-scrim" *ngIf="isProfileSheetOpen" (click)="closeProfileSheet()"></div>
<div class="nav-profile-bottom-sheet" [class.open]="isProfileSheetOpen" *transloco="let t">
  <div class="sheet-handle-wrapper" (click)="closeProfileSheet()">
    <div class="sheet-handle"></div>
  </div>
  
  <div class="sheet-header">
    <div class="sheet-avatar">
      <img [src]="profilePhotoUrl || 'assets/icons/default-avatar.png'" alt="">
    </div>
    <div class="sheet-user-info">
      <span class="sheet-username">{{ profileUsername }}</span>
    </div>
  </div>

  <div class="sheet-menu">
    <a routerLink="/profile" class="sheet-item" (click)="closeProfileSheet()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      {{ t('profileMenu.profile') }}
    </a>
    
    <a routerLink="/profile/edit" class="sheet-item" (click)="closeProfileSheet()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
      {{ t('profileMenu.editProfile') }}
    </a>

    <button class="sheet-item" (click)="openSettings()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.51a2 2 0 0 1 1-1.72l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      {{ t('profileMenu.importFolders') }}
    </button>

    <div class="sheet-preferences">
      <button class="pref-btn" (click)="toggleTheme()" [attr.aria-label]="t('profileMenu.theme')">
        <svg *ngIf="themeService.theme() === 'dark'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg *ngIf="themeService.theme() === 'light'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>

      <div class="lang-selector">
        <button class="lang-btn" [class.active]="languageService.uiLanguage() === 'tr'" (click)="setLanguage('tr')">TR</button>
        <button class="lang-btn" [class.active]="languageService.uiLanguage() === 'en'" (click)="setLanguage('en')">EN</button>
      </div>
    </div>

    <button class="sheet-item logout-item" (click)="logout()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      {{ t('profileMenu.signOut') }}
    </button>
  </div>
</div>

<app-clip-picker-modal *ngIf="showClipPicker" [clips]="unpostedClips" (cancel)="closeClipPicker()" (confirm)="onClipPickerConfirm($event)"></app-clip-picker-modal>
<app-add-post-modal *ngIf="showAddPostModal" [clip]="selectedClipToPost" (close)="showAddPostModal = false"></app-add-post-modal>
<app-import-folders-dialog *ngIf="showSettingsDialog" (closed)="closeSettings()"></app-import-folders-dialog>
