<div class="modal-overlay" (click)="onCancel()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        </svg>
        Add to Group
      </h2>
      <button class="close-btn" (click)="onCancel()" title="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <p class="selected-count">{{ clipCount }} selected clip{{ clipCount === 1 ? '' : 's' }}</p>

    <div class="group-options" *ngIf="groups.length > 0">
      <button
        type="button"
        class="group-option"
        *ngFor="let group of groups"
        [class.active]="!isCreatingNew && selectedGroupId === group.id"
        (click)="selectExisting(group.id)">
        <span>
          <strong>{{ group.name }}</strong>
          <small>{{ group.clipCount || 0 }} clips</small>
        </span>
        <span class="radio-dot"></span>
      </button>
    </div>

    <button type="button" class="new-group-toggle" [class.active]="isCreatingNew" (click)="selectNew()">
      <span>Create new group</span>
      <span class="radio-dot"></span>
    </button>

    <div class="new-group-form" *ngIf="isCreatingNew">
      <label for="group-name">Group Name</label>
      <input
        id="group-name"
        type="text"
        [(ngModel)]="groupName"
        maxlength="50"
        placeholder="Favorite clutches"
        (keydown.enter)="onSubmit()">

      <label for="group-description">Description <span>optional</span></label>
      <textarea
        id="group-description"
        [(ngModel)]="groupDescription"
        maxlength="200"
        rows="3"
        placeholder="What belongs in this group?"></textarea>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="onCancel()">Cancel</button>
      <button class="btn-create" [disabled]="isCreatingNew && !groupName.trim()" (click)="onSubmit()">
        Save Group
      </button>
    </div>
  </div>
</div>
