@if (repostMode === 'SELECT') {
  <div class="repost-panel" [ngClass]="{'media-repost-panel': isMediaPost}" [ngStyle]="repostPanelPosition" (click)="$event.stopPropagation()">
    <button type="button" class="repost-option" (click)="selectRepostMode('SELECT')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="17 1 21 5 17 9"></polyline>
        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
        <polyline points="7 23 3 19 7 15"></polyline>
        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
      </svg>
      <span>{{ isReposting ? ('repost.reposting' | transloco) : ('repost.repost' | transloco) }}</span>
    </button>
    <button type="button" class="repost-option" (click)="selectRepostMode('QUOTE')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      <span>{{ 'repost.quote' | transloco }}</span>
    </button>
  </div>
}

@if (repostMode === 'QUOTE') {
  <div class="quote-overlay" (click)="onClose()">
    <div class="quote-compose-modal" (click)="$event.stopPropagation()">
      <div class="quote-compose-header">
        <button type="button" class="repost-close-btn" (click)="onClose()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
        <strong>{{ 'repost.quotePost' | transloco }}</strong>
        <button
          type="button"
          class="quote-post-btn"
          [disabled]="isReposting || !quoteText.trim()"
          (click)="doSubmit()">
          {{ isReposting ? ('repost.posting' | transloco) : ('repost.post' | transloco) }}
        </button>
      </div>

      <div class="quote-compose-body">
        <div class="quote-compose-row">
          <img [src]="currentUserPhoto()" alt="" class="quote-user-avatar">
          <div class="quote-compose-input">
            <textarea
              class="repost-quote-textarea"
              [(ngModel)]="quoteText"
              rows="4"
              maxlength="500"
              [placeholder]="'repost.addThoughts' | transloco"></textarea>

            <div class="quote-media-preview" *ngIf="quoteMediaFile">
              <img *ngIf="!quoteIsVideo" [src]="quoteMediaPreview" alt="Preview">
              <video *ngIf="quoteIsVideo" [src]="quoteMediaPreview" controls></video>
              <button type="button" class="remove-media-btn" (click)="removeQuoteMedia()">×</button>
            </div>

            <div class="repost-quoted-card">
              <div class="repost-quoted-author">
                <img [src]="post.author.profilePhotoUrl || 'assets/icons/profile-pic.svg'" alt="">
                <strong>{{ post.author.username }}</strong>
                <span>· {{ post.timeAgo }}</span>
              </div>
              <p class="repost-quoted-text" *ngIf="post.title">{{ post.title }}</p>
              <div class="repost-quoted-media" *ngIf="post.videoUrl">
                <img *ngIf="isImageMedia(post); else quoteVideo" [src]="post.videoUrl" alt="">
                <ng-template #quoteVideo>
                  <video [src]="post.videoUrl" muted></video>
                </ng-template>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="quote-compose-footer">
        <input type="file" #quoteMediaInput accept="image/*,video/*" hidden (change)="onQuoteMediaSelected($event)">
        <button type="button" class="action-btn media-btn" (click)="quoteMediaInput.click()" [title]="'repost.addMedia' | transloco">
          <svg viewBox="0 0 24 24" class="icon" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
        </button>
      </div>
    </div>
  </div>
}
